services:
  upload-service:
    container_name: nest-upload-service
    build:
      context: ./upload-service
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./upload-service:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development

  auth-db:
    container_name: stromen-auth-db
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data

  user-db:
    container_name: stromen-user-db
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql/data

  pgadmin:
    container_name: stromen-pgadmin
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - auth-db
      - user-db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  auth_data:
    name: stromen_auth_data
  user_data:
    name: stromen_user_data
  pgadmin_data:
    name: stromen_pgadmin_data