services:
  upload-service:
    container_name: nest-upload-service
    build:
      context: ./upload-service
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./upload-service:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./upload-service/.env
    environment:
      NODE_ENV: development
    depends_on:
      upload-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  transcode-worker:
    container_name: nest-transcode-worker
    build:
      context: ./transcode-worker
      dockerfile: Dockerfile
    env_file:
      - ./transcode-worker/.env
    volumes:
      - ./transcode-worker:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      upload-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  auth-db:
    container_name: stromen-auth-db
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data

  user-db:
    container_name: stromen-user-db
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql/data

  upload-db:
    container_name: stromen-upload-db
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: upload_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5434:5432"
    volumes:
      - upload_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d upload_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    container_name: stromen-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    container_name: stromen-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts/minio/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]

  rabbitmq:
    container_name: stromen-rabbitmq
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    container_name: stromen-pgadmin
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - auth-db
      - user-db
      - upload-db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  auth_data:
    name: stromen_auth_data
  user_data:
    name: stromen_user_data
  upload_data:
    name: stromen_upload_data
  minio_data:
    name: stromen_minio_data
  rabbitmq_data:
    name: stromen_rabbitmq_data
  pgadmin_data:
    name: stromen_pgadmin_data